name: Checks and Validation
on:
  pull_request:

jobs:
  linters:
    name: Run linters
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: Generate svelte data
        run: |
          npm run sync

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          client-id: ${{ secrets.COMMIT_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_BOT_PRIVATE_KEY }}

      - name: Run linters
        uses: profiidev/rust-lint-action@ec3bf81f84ae2a9834fce8967d0eabe852227ff9 # v4
        with:
          auto_fix: true
          prettier: true
          prettier_extensions: "css,html,js,json,jsx,md,sass,scss,ts,tsx,vue,yaml,yml,svelte"
          svelte: true
          oxlint: true
          git_sign_commits: true
          github_token: ${{ steps.app-token.outputs.token }}

  build-test:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: Generate svelte data
        run: |
          npm run sync

      - name: Build project
        run: |
          npm run build
